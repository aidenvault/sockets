<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSocket API Server - Demo Interface</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- Styles -->
  <link rel="stylesheet" href="demo.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <div class="brand">
          <i class="ph ph-rocket-launch brand-icon"></i>
          <div class="brand-text">
            <h1>WebSocket API Server</h1>
            <p>Real-time messaging and inference orchestration</p>
          </div>
        </div>
        
        <div class="status-bar">
          <div class="status-indicator">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Disconnected</span>
          </div>
          <div class="client-id" id="client-id"></div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <!-- Connection Panel -->
      <section class="panel connection-panel">
        <div class="panel-header">
          <i class="ph-bold ph-plug panel-icon"></i>
          <h2 class="panel-title">Connection</h2>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="ws-url">WebSocket URL</label>
          <input 
            type="text" 
            id="ws-url" 
            class="form-input" 
            value="ws://localhost:8080/ws" 
            placeholder="ws://localhost:8080/ws"
          >
        </div>
        
        <div class="form-group">
          <label class="form-label" for="auth-token">Auth Token (Optional)</label>
          <input 
            type="text" 
            id="auth-token" 
            class="form-input" 
            placeholder="Leave empty for dev mode"
          >
        </div>
        
        <div class="btn-group">
          <button id="connect-btn" class="btn btn-primary">
            <i class="ph-bold ph-power btn-icon"></i>
            Connect
          </button>
          <button id="disconnect-btn" class="btn btn-secondary" disabled>
            <i class="ph-bold ph-x-circle btn-icon"></i>
            Disconnect
          </button>
        </div>
      </section>

      <!-- Quick Actions Panel -->
      <section class="panel actions-panel">
        <div class="panel-header">
          <i class="ph-bold ph-lightning panel-icon"></i>
          <h2 class="panel-title">Quick Actions</h2>
        </div>
        
        <div class="actions-grid">
          <button class="action-btn" data-action="ping" disabled>
            <i class="ph-bold ph-ping-pong action-icon"></i>
            Send Ping
          </button>
          
          <button class="action-btn" data-action="stats" disabled>
            <i class="ph-bold ph-chart-bar action-icon"></i>
            Get Stats
          </button>
          
          <button class="action-btn" data-action="broadcast" disabled>
            <i class="ph-bold ph-broadcast action-icon"></i>
            Broadcast
          </button>
          
          <button class="action-btn" data-action="inference" disabled>
            <i class="ph-bold ph-brain action-icon"></i>
            Inference
          </button>
        </div>
      </section>

      <!-- Custom Message Panel -->
      <section class="panel composer-panel">
        <div class="panel-header">
          <i class="ph-bold ph-envelope-simple panel-icon"></i>
          <h2 class="panel-title">Custom Message</h2>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="message-type">Message Type</label>
          <select id="message-type" class="form-select">
            <option value="PING">PING</option>
            <option value="BROADCAST">BROADCAST</option>
            <option value="DIRECT_MESSAGE">DIRECT_MESSAGE</option>
            <option value="ROOM_MESSAGE">ROOM_MESSAGE</option>
            <option value="SUBSCRIBE">SUBSCRIBE</option>
            <option value="UNSUBSCRIBE">UNSUBSCRIBE</option>
            <option value="INFERENCE_REQUEST">INFERENCE_REQUEST</option>
            <option value="GET_STATS">GET_STATS</option>
            <option value="GET_CONNECTIONS">GET_CONNECTIONS</option>
            <option value="custom">Custom JSON...</option>
          </select>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="message-payload">Payload (JSON)</label>
          <textarea 
            id="message-payload" 
            class="form-textarea" 
            placeholder='{"message": "Hello, World!"}'
          ></textarea>
        </div>
        
        <button id="send-message-btn" class="btn btn-primary" disabled>
          <i class="ph-bold ph-paper-plane-tilt btn-icon"></i>
          Send Message
        </button>
      </section>

      <!-- Rooms/Channels Panel -->
      <section class="panel rooms-panel">
        <div class="panel-header">
          <i class="ph-bold ph-users-three panel-icon"></i>
          <h2 class="panel-title">Rooms / Channels</h2>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="channel-name">Channel Name</label>
          <input 
            type="text" 
            id="channel-name" 
            class="form-input" 
            placeholder="general"
          >
        </div>
        
        <div class="btn-group">
          <button id="join-channel-btn" class="btn btn-primary btn-sm" disabled>
            <i class="ph-bold ph-sign-in btn-icon"></i>
            Join
          </button>
          <button id="leave-channel-btn" class="btn btn-secondary btn-sm" disabled>
            <i class="ph-bold ph-sign-out btn-icon"></i>
            Leave
          </button>
        </div>
        
        <div class="channels-list" id="channels-list">
          <div class="empty-state">No channels joined</div>
        </div>
      </section>

      <!-- Message Log Panel -->
      <section class="panel log-panel">
        <div class="log-header">
          <div class="panel-header" style="margin-bottom: 0;">
            <i class="ph-bold ph-list-bullets panel-icon"></i>
            <h2 class="panel-title">Message Log</h2>
          </div>
          
          <div class="log-controls">
            <label class="checkbox-label">
              <input type="checkbox" id="auto-scroll" checked>
              <span>Auto-scroll</span>
            </label>
            <button id="clear-log-btn" class="btn btn-secondary btn-sm">
              <i class="ph-bold ph-trash btn-icon"></i>
              Clear
            </button>
          </div>
        </div>
        
        <div class="log-content" id="log-content">
          <div class="empty-state">No messages yet. Connect to start.</div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>WebSocket API Server v1.0.0 | <a href="https://github.com" target="_blank">Documentation</a></p>
    </footer>
  </div>

  <!-- Script -->
  <script src="demo.js"></script>
</body>
</html>
